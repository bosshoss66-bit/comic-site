[build]
  publish = "."

[[redirects]]
  from = "/comic/*"
  to = "/reader.html"
  status = 200

[[headers]]
  for = "/data/comics.json"
  [headers.values]
    Cache-Control = "no-store, must-revalidate"

[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
